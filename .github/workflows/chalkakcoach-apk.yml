name: Build ChalkakCoach APK

on:
  push:
    branches:
      - build/chalkakcoach-apk
    paths:
      - "build-input/**"
      - ".github/workflows/chalkakcoach-apk.yml"
  pull_request:
    branches:
      - main
    paths:
      - "build-input/**"
      - ".github/workflows/chalkakcoach-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout build branch
        uses: actions/checkout@v4

      - name: Reconstruct project archive
        shell: bash
        run: |
          set -euo pipefail
          : > ChalkakCoach.zip.b64
          for part in 00 01 02 03; do
            tr -d '\r\n' < "build-input/chalkakcoach.part${part}" >> ChalkakCoach.zip.b64
          done
          tr -d '\r\n' < build-input/chalkakcoach.part04 >> ChalkakCoach.zip.b64
          printf '69' >> ChalkakCoach.zip.b64
          tr -d '\r\n' < build-input/chalkakcoach.part05 >> ChalkakCoach.zip.b64
          tr -d '\r\n' < build-input/chalkakcoach.part06 | head -c 6980 >> ChalkakCoach.zip.b64
          printf 'dXgLAAEEAAAAAATpAwAA' >> ChalkakCoach.zip.b64
          tr -d '\r\n' < build-input/chalkakcoach.part07a >> ChalkakCoach.zip.b64
          tr -d '\r\n' < build-input/chalkakcoach.part07b >> ChalkakCoach.zip.b64
          tr -d '\r\n' < build-input/chalkakcoach.part08 >> ChalkakCoach.zip.b64
          test "$(wc -c < ChalkakCoach.zip.b64)" -eq 56768
          echo "832a94dc641331943119ce723d518989929881b1e230f914e519507c7285dcc1  ChalkakCoach.zip.b64" | sha256sum --check
          base64 --decode ChalkakCoach.zip.b64 > ChalkakCoach.zip
          echo "58203a2947968d0921ed265aceda52e9331e8176a4ce66fbf670ceb9228313ec  ChalkakCoach.zip" | sha256sum --check
          unzip -q ChalkakCoach.zip
          test -f ChalkakCoach/settings.gradle.kts

      - name: Apply Android 16 build compatibility
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          gradle_path = Path("ChalkakCoach/app/build.gradle.kts")
          gradle_text = gradle_path.read_text(encoding="utf-8")
          old = '''    kotlinOptions {
                  jvmTarget = "17"
              }
          '''
          if old not in gradle_text:
              raise SystemExit("Expected kotlinOptions block was not found")
          gradle_text = gradle_text.replace(old, "", 1)
          marker = "\ndependencies {"
          replacement = '''
          
          kotlin {
              compilerOptions {
                  jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)
              }
          }
          
          dependencies {'''
          gradle_text = gradle_text.replace(marker, replacement, 1)
          gradle_path.write_text(gradle_text, encoding="utf-8")

          catalog_path = Path("ChalkakCoach/gradle/libs.versions.toml")
          catalog = catalog_path.read_text(encoding="utf-8")
          replacements = {
              'coreKtx = "1.19.0"': 'coreKtx = "1.17.0"',
              'activityCompose = "1.13.0"': 'activityCompose = "1.11.0"',
              'lifecycle = "2.11.0"': 'lifecycle = "2.9.4"',
          }
          for before, after in replacements.items():
              if before not in catalog:
                  raise SystemExit(f"Expected version entry not found: {before}")
              catalog = catalog.replace(before, after, 1)
          catalog_path.write_text(catalog, encoding="utf-8")

          main_path = Path("ChalkakCoach/app/src/main/java/kr/co/chalkakcoach/MainActivity.kt")
          main_text = main_path.read_text(encoding="utf-8")
          if "import androidx.activity.compose.setContent" not in main_text:
              main_text = main_text.replace(
                  "import androidx.activity.compose.rememberLauncherForActivityResult\n",
                  "import androidx.activity.compose.rememberLauncherForActivityResult\nimport androidx.activity.compose.setContent\n",
                  1,
              )
          main_path.write_text(main_text, encoding="utf-8")

          camera_path = Path("ChalkakCoach/app/src/main/java/kr/co/chalkakcoach/camera/CameraScreen.kt")
          camera_text = camera_path.read_text(encoding="utf-8")
          camera_text = camera_text.replace(
              "import androidx.compose.ui.draw.border",
              "import androidx.compose.foundation.border",
              1,
          )
          camera_text = camera_text.replace(
              'statusMessage = "$remaining초 후 촬영합니다"',
              'statusMessage = "${remaining}초 후 촬영합니다"',
              1,
          )
          camera_path.write_text(camera_text, encoding="utf-8")
          PY

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build and test debug APK
        id: gradle_build
        shell: bash
        working-directory: ChalkakCoach
        run: |
          set +e
          gradle --no-daemon clean testDebugUnitTest assembleDebug 2>&1 | tee ../chalkakcoach-build.log
          result=${PIPESTATUS[0]}
          echo "exit_code=${result}" >> "$GITHUB_OUTPUT"
          exit "$result"

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ChalkakCoach-Gradle-build-log
          path: chalkakcoach-build.log
          if-no-files-found: error
          retention-days: 2

      - name: Prepare APK artifact
        if: steps.gradle_build.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          cp ChalkakCoach/app/build/outputs/apk/debug/app-debug.apk ChalkakCoach-Stage2-debug.apk
          sha256sum ChalkakCoach-Stage2-debug.apk > ChalkakCoach-Stage2-debug.apk.sha256

      - name: Upload installable APK
        if: steps.gradle_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ChalkakCoach-Stage2-debug-apk
          path: |
            ChalkakCoach-Stage2-debug.apk
            ChalkakCoach-Stage2-debug.apk.sha256
          if-no-files-found: error
          retention-days: 7
