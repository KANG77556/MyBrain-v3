name: Build MyBrain AI APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 네 가지 값이 모두 등록된 경우에만 고정 서명 릴리스 빌드를 실행합니다.
      HAS_RELEASE_SIGNING: ${{ secrets.MYBRAIN_KEYSTORE_BASE64 != '' && secrets.MYBRAIN_KEYSTORE_PASSWORD != '' && secrets.MYBRAIN_KEY_ALIAS != '' && secrets.MYBRAIN_KEY_PASSWORD != '' }}
      EXPECTED_CERT_SHA256: ee9b89627074c2708f7d91ae1a9fcf5ebd8f9611b4df0719e8aa4eef63765520

    steps:
      - name: 소스 내려받기
        uses: actions/checkout@v4

      - name: Java 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK 설치
        uses: android-actions/setup-android@v3

      - name: SDK 패키지 설치
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Gradle 8.9 설치
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: 앱 버전 확인
        shell: bash
        run: |
          VERSION_NAME=$(sed -n "s/^[[:space:]]*versionName[[:space:]]*'\([^']*\)'.*/\1/p" app/build.gradle | head -n 1)
          if [ -z "$VERSION_NAME" ]; then
            echo "app/build.gradle에서 versionName을 찾지 못했습니다."
            exit 1
          fi
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "현재 앱 버전: $VERSION_NAME"

      - name: 디버그 APK 빌드
        run: gradle --stacktrace assembleDebug

      - name: 디버그 APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: MyBrainAI-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # 고정 서명 비밀값이 없을 때도 릴리스용 원본 APK를 확보합니다.
      - name: 서명 전 릴리스 APK 빌드
        if: env.HAS_RELEASE_SIGNING != 'true'
        run: gradle --stacktrace assembleRelease

      - name: 서명 전 릴리스 APK 업로드
        if: env.HAS_RELEASE_SIGNING != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: MyBrainAI-unsigned-release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

      # 아래 단계는 GitHub Actions Secrets에 고정 서명 정보 4개가 모두 등록된 경우에만 실행됩니다.
      - name: 고정 서명키 복원
        if: env.HAS_RELEASE_SIGNING == 'true'
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.MYBRAIN_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mybrain-release.jks"
          test -s "$RUNNER_TEMP/mybrain-release.jks"

      - name: 고정 서명 릴리스 APK 빌드
        if: env.HAS_RELEASE_SIGNING == 'true'
        env:
          MYBRAIN_KEYSTORE_FILE: ${{ runner.temp }}/mybrain-release.jks
          MYBRAIN_KEYSTORE_PASSWORD: ${{ secrets.MYBRAIN_KEYSTORE_PASSWORD }}
          MYBRAIN_KEY_ALIAS: ${{ secrets.MYBRAIN_KEY_ALIAS }}
          MYBRAIN_KEY_PASSWORD: ${{ secrets.MYBRAIN_KEY_PASSWORD }}
        run: gradle --stacktrace assembleRelease

      - name: APK 서명과 인증서 검증
        if: env.HAS_RELEASE_SIGNING == 'true'
        shell: bash
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"

          test -f "$APK"
          "$APKSIGNER" verify --verbose --print-certs "$APK" | tee apk-signature-report.txt

          grep -q "Verified using v2 scheme (APK Signature Scheme v2): true" apk-signature-report.txt
          grep -q "Verified using v3 scheme (APK Signature Scheme v3): true" apk-signature-report.txt

          ACTUAL_CERT=$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' apk-signature-report.txt \
            | head -n 1 | tr '[:upper:]' '[:lower:]' | tr -d ':[:space:]')

          if [ "$ACTUAL_CERT" != "$EXPECTED_CERT_SHA256" ]; then
            echo "서명 인증서가 MyBrain AI 고정 인증서와 다릅니다."
            echo "예상: $EXPECTED_CERT_SHA256"
            echo "실제: $ACTUAL_CERT"
            exit 1
          fi

      - name: 릴리스 파일 이름과 검증값 생성
        if: env.HAS_RELEASE_SIGNING == 'true'
        shell: bash
        run: |
          RELEASE_APK="MyBrainAI-v${VERSION_NAME}-release.apk"
          cp app/build/outputs/apk/release/app-release.apk "$RELEASE_APK"
          sha256sum "$RELEASE_APK" > "$RELEASE_APK.sha256"
          echo "RELEASE_APK=$RELEASE_APK" >> "$GITHUB_ENV"

      - name: 고정 서명 릴리스 APK 업로드
        if: env.HAS_RELEASE_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: MyBrainAI-release-apk
          path: |
            ${{ env.RELEASE_APK }}
            ${{ env.RELEASE_APK }}.sha256
            apk-signature-report.txt
          if-no-files-found: error
