name: Export Android apksigner tool

on:
  pull_request:
    branches: ["main"]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Android SDK 설치
        uses: android-actions/setup-android@v3

      - name: Android Build Tools 설치
        run: sdkmanager "build-tools;35.0.0"

      - name: apksigner 도구 업로드
        uses: actions/upload-artifact@v4
        with:
          name: android-apksigner-35
          path: |
            ${{ env.ANDROID_HOME }}/build-tools/35.0.0/apksigner
            ${{ env.ANDROID_HOME }}/build-tools/35.0.0/lib/apksigner.jar
          if-no-files-found: error
