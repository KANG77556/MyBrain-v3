name: Apply date range fix

on:
  push:
    branches:
      - mybrain-v1.7.2-date-range

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 내려받기
        uses: actions/checkout@v4
        with:
          ref: mybrain-v1.7.2-date-range
          fetch-depth: 0

      - name: 날짜·시간 범위 수정 적용
        run: python3 scripts/apply_date_range_fix.py

      - name: 변경 내용 커밋
        run: |
          if git diff --quiet; then
            echo "추가 변경 없음"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/kr/co/mybrain/ai/CloudAiAnalyzer.java \
                  app/src/main/java/kr/co/mybrain/ai/AiInputActivity.java \
                  app/src/main/java/kr/co/mybrain/ai/IntegratedMainActivity.java \
                  app/build.gradle
          git commit -m "날짜·시간 범위 문장을 AI 호출 전에 정확히 분석"
          git push origin HEAD:mybrain-v1.7.2-date-range
