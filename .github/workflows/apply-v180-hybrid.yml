name: Apply v1.8.0 hybrid AI

on:
  push:
    branches:
      - mybrain-v1.8.0-hybrid-ai

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 내려받기
        uses: actions/checkout@v4
        with:
          ref: mybrain-v1.8.0-hybrid-ai
          fetch-depth: 0

      - name: 하이브리드 분석 코드 적용
        run: python3 scripts/apply_v180_hybrid.py

      - name: 변경 내용 커밋
        run: |
          if git diff --quiet; then
            echo "추가 변경 없음"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/kr/co/mybrain/ai/AiInputActivity.java \
                  app/src/main/java/kr/co/mybrain/ai/IntegratedMainActivity.java \
                  app/build.gradle
          git commit -m "v1.8.0 규칙 우선 하이브리드 분석 적용"
          git push origin HEAD:mybrain-v1.8.0-hybrid-ai
