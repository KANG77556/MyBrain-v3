name: Build AllFileHub Internal APK

on:
  push:
    branches:
      - allfilehub-internal-apk
    paths:
      - 'allfilehub-apk/**'
      - '.github/workflows/build-allfilehub-apk.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'allfilehub-apk/**'
      - '.github/workflows/build-allfilehub-apk.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 소스 받기
        uses: actions/checkout@v4

      - name: 내부 실행 엔진 반영
        shell: bash
        run: |
          cat <<'B64' | base64 -d | gzip -d > allfilehub-apk/app/src/main/java/com/seongho/allfilehub/MainActivity.java
          
          B64
          sed -i "s/versionCode 5/versionCode 6/" allfilehub-apk/app/build.gradle
          sed -i "s/versionName '1.4.0-apk'/versionName '1.5.0-internal'/" allfilehub-apk/app/build.gradle

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK 설정
        uses: android-actions/setup-android@v3

      - name: Android SDK 35 설치
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Gradle 8.9 설정
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: 디버그 APK 빌드
        working-directory: allfilehub-apk
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: APK 파일명 정리
        run: |
          mkdir -p output
          cp allfilehub-apk/app/build/outputs/apk/debug/app-debug.apk output/AllFileHub-1.5.0-internal-debug.apk
          sha256sum output/AllFileHub-1.5.0-internal-debug.apk > output/SHA256.txt

      - name: APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: AllFileHub-Internal-APK
          path: output/
          if-no-files-found: error
          retention-days: 30
